name: Nova Factory

on:
  repository_dispatch:
    types: [factory-trigger]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install factory dependencies
        run: pip install anthropic requests

      - name: Configure git identity
        run: |
          git config user.name "Nova Factory"
          git config user.email "factory@nova.build"

      # Phase 1: agents run, files written, committed to feature branch, pushed
      - name: Factory — build phase
        id: factory_build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_FEATURES_DB_ID: ${{ secrets.NOTION_FEATURES_DB_ID }}
          NOTION_DECISIONS_DB_ID: ${{ secrets.NOTION_DECISIONS_DB_ID }}
          NOTION_RUNS_DB_ID: ${{ secrets.NOTION_RUNS_DB_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PYTHONPATH=scripts python scripts/factory_run.py build ${{ github.event.client_payload.feature_id }}

      # Quality gate: Python dependencies
      - name: Install app dependencies
        if: steps.factory_build.outcome == 'success' && hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      # Quality gate: auto-format and fix lint
      - name: Auto-format and fix lint (ruff)
        if: steps.factory_build.outcome == 'success' && hashFiles('app/**/*.py') != ''
        run: |
          pip install ruff --quiet
          ruff format app/
          ruff check app/ --fix --unsafe-fixes || true
          if ! git diff --quiet; then
            git add app/
            git commit -m "style: auto-fix ruff formatting and lint issues"
            git push origin HEAD
          fi

      # Quality gate: lint
      - name: Lint gate (ruff)
        if: steps.factory_build.outcome == 'success' && hashFiles('app/**/*.py') != ''
        run: ruff check app/

      # Quality gate: types
      - name: Type check (mypy)
        if: steps.factory_build.outcome == 'success' && hashFiles('app/**/*.py') != ''
        run: |
          pip install mypy --quiet
          mypy app/ --ignore-missing-imports --no-error-summary || true

      # Quality gate: protect existing tests from agent overwrites
      - name: Protect existing tests from agent overwrites
        if: steps.factory_build.outcome == 'success'
        run: |
          git diff origin/main --name-only --diff-filter=M tests/ | xargs -r git checkout origin/main --

      # Quality gate: tests
      - name: Run tests
        if: steps.factory_build.outcome == 'success'
        run: |
          pip install pytest pytest-asyncio httpx starlette --quiet
          if find tests/ -name "test_*.py" | grep -q .; then
            pip install -r requirements.txt --quiet 2>/dev/null || true
            pytest tests/ -x -q --tb=short
          else
            echo "No test files found — skipping pytest"
          fi

      # Quality gate: Docker build (validates Dockerfile is correct before merge)
      - name: Build Docker image
        if: steps.factory_build.outcome == 'success' && hashFiles('Dockerfile') != ''
        run: |
          docker build -t nova-api:factory-test .
          echo "Docker build succeeded"

      # Quality gate: Terraform validate (if infra changed)
      - name: Validate Terraform
        if: steps.factory_build.outcome == 'success' && hashFiles('infra/main.tf') != ''
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y -qq terraform
          cd infra && terraform init -backend=false && terraform validate

      # Phase 2: all quality gates passed — create PR and merge
      - name: Factory — merge phase
        if: success()
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_FEATURES_DB_ID: ${{ secrets.NOTION_FEATURES_DB_ID }}
          NOTION_RUNS_DB_ID: ${{ secrets.NOTION_RUNS_DB_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PYTHONPATH=scripts python scripts/factory_run.py merge ${{ github.event.client_payload.feature_id }}

      # On any failure after the build phase: update Notion and clean up branch
      - name: Factory — mark failed
        if: failure() && steps.factory_build.outcome == 'success'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_FEATURES_DB_ID: ${{ secrets.NOTION_FEATURES_DB_ID }}
          NOTION_RUNS_DB_ID: ${{ secrets.NOTION_RUNS_DB_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PYTHONPATH=scripts python scripts/factory_run.py fail \
            ${{ github.event.client_payload.feature_id }} \
            "Quality gate failure — see GitHub Actions logs for details"

      - name: Trigger deploy
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            })
