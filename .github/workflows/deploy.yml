name: Deploy

on:
  workflow_dispatch:

env:
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: nova-terraform-locks
  AWS_REGION: us-east-1
  ECR_API_REPO: nova-api
  ECR_WORKER_REPO: nova-worker

jobs:
  # ── Pre-flight checks ──────────────────────────────────────────────────────
  preflight:
    name: Pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Workspace pre-flight
        run: |
          fail() { echo "::error::$1"; exit 1; }
          if [ -f app/main.py ]; then
            grep -q '"/health"' app/main.py || grep -q "'/health'" app/main.py \
              || fail "/health endpoint missing from app/main.py"
            python3 -c "import ast; ast.parse(open('app/main.py').read())" \
              || fail "app/main.py is not syntactically valid Python"
          fi
          if [ -f Dockerfile ] && [ ! -f requirements.txt ]; then
            fail "Dockerfile present but requirements.txt missing"
          fi
          echo "Pre-flight passed"

  # ── Build & push container images ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: preflight
    # Only run if a Dockerfile exists — skip gracefully during early infra-only phases
    outputs:
      api_image: ${{ steps.push.outputs.api_image }}
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not yet present — skipping image build"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.check.outputs.skip != 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        if: steps.check.outputs.skip != 'true'
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${IMAGE_TAG::7}"
          API_IMAGE="$ECR_REGISTRY/$ECR_API_REPO:$SHORT_SHA"

          docker build \
            --label "git.sha=$IMAGE_TAG" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$API_IMAGE" \
            -t "$ECR_REGISTRY/$ECR_API_REPO:latest" \
            .

          docker push "$API_IMAGE"
          docker push "$ECR_REGISTRY/$ECR_API_REPO:latest"

          # Worker uses the same image — just tag and push
          docker tag "$API_IMAGE" "$ECR_REGISTRY/$ECR_WORKER_REPO:$SHORT_SHA"
          docker tag "$API_IMAGE" "$ECR_REGISTRY/$ECR_WORKER_REPO:latest"
          docker push "$ECR_REGISTRY/$ECR_WORKER_REPO:$SHORT_SHA"
          docker push "$ECR_REGISTRY/$ECR_WORKER_REPO:latest"

          echo "api_image=$API_IMAGE" >> $GITHUB_OUTPUT
          echo "Pushed: $API_IMAGE"

  # ── Deploy to Staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [preflight, build-and-push]
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check infra exists
        id: infra_check
        run: |
          if [ ! -f infra/main.tf ]; then
            echo "infra/main.tf not yet present — skipping Terraform deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.infra_check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.infra_check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init (staging)
        if: steps.infra_check.outputs.skip != 'true'
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=nova/staging/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform Plan (staging)
        if: steps.infra_check.outputs.skip != 'true'
        working-directory: infra
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_environment: staging
          TF_VAR_api_image: ${{ needs.build-and-push.outputs.api_image }}
        run: terraform plan -out=tfplan-staging

      - name: Terraform Apply (staging)
        if: steps.infra_check.outputs.skip != 'true'
        working-directory: infra
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_environment: staging
          TF_VAR_api_image: ${{ needs.build-and-push.outputs.api_image }}
        run: terraform apply tfplan-staging

      # Force ECS to redeploy with the new image (task_definition is ignored_changes in TF)
      - name: Force ECS redeployment (staging)
        if: >
          steps.infra_check.outputs.skip != 'true' &&
          needs.build-and-push.outputs.skip != 'true'
        run: |
          CLUSTER="nova-staging"
          SERVICE="nova-api-staging"
          # Check if service exists before forcing redeploy
          if aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
               --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            # Register new task definition with updated image
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "nova-api-staging" \
              --query 'taskDefinition' --output json)
            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg IMAGE "${{ needs.build-and-push.outputs.api_image }}" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
               .containerDefinitions[0].image = $IMAGE')
            NEW_TASK_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --task-definition "$NEW_TASK_ARN" \
              --force-new-deployment
            # Wait for stable deployment
            aws ecs wait services-stable \
              --cluster "$CLUSTER" \
              --services "$SERVICE"
            echo "ECS staging deployment stable"
          else
            echo "ECS service not yet provisioned — skipping force-redeploy"
          fi

  # ── Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [preflight, build-and-push, deploy-staging]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check infra exists
        id: infra_check
        run: |
          if [ ! -f infra/main.tf ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.infra_check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.infra_check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init (production)
        if: steps.infra_check.outputs.skip != 'true'
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=nova/production/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform Plan (production)
        if: steps.infra_check.outputs.skip != 'true'
        working-directory: infra
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_environment: production
          TF_VAR_api_image: ${{ needs.build-and-push.outputs.api_image }}
        run: terraform plan -out=tfplan-production

      - name: Terraform Apply (production)
        if: steps.infra_check.outputs.skip != 'true'
        working-directory: infra
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_environment: production
          TF_VAR_api_image: ${{ needs.build-and-push.outputs.api_image }}
        run: terraform apply tfplan-production

      - name: Force ECS redeployment (production)
        if: >
          steps.infra_check.outputs.skip != 'true' &&
          needs.build-and-push.outputs.skip != 'true'
        run: |
          CLUSTER="nova-production"
          SERVICE="nova-api-production"
          if aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
               --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "nova-api-production" \
              --query 'taskDefinition' --output json)
            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg IMAGE "${{ needs.build-and-push.outputs.api_image }}" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
               .containerDefinitions[0].image = $IMAGE')
            NEW_TASK_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --task-definition "$NEW_TASK_ARN" \
              --force-new-deployment
            aws ecs wait services-stable \
              --cluster "$CLUSTER" \
              --services "$SERVICE"
            echo "ECS production deployment stable"
          else
            echo "ECS service not yet provisioned — skipping force-redeploy"
          fi


  # ── Trigger postdeploy verification SFN ───────────────────────────────────
  trigger-postdeploy:
    name: Trigger postdeploy verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-staging]
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read .factory/last-run/meta.json + start postdeploy SFN
        run: |
          if [[ ! -f .factory/last-run/meta.json ]]; then
            echo "no .factory/last-run/meta.json on this commit — not a factory-built feature; skipping postdeploy"
            exit 0
          fi
          FEATURE_ID="$(python3 -c "import json; print(json.load(open('.factory/last-run/meta.json'))['feature_id'])")"
          MERGE_SHA="$(git rev-parse HEAD)"
          aws stepfunctions start-execution \
            --state-machine-arn arn:aws:states:us-east-1:577638385116:stateMachine:nova-factory-postdeploy \
            --name "postdeploy-${MERGE_SHA:0:8}-$(date +%s)" \
            --input "{\"feature_id\":\"$FEATURE_ID\",\"merge_sha\":\"$MERGE_SHA\"}"
