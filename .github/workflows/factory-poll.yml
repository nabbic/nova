name: Nova Factory Poller

on:
  schedule:
    # Runs every 5 minutes — picks up "Ready to Build" features from Notion
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Poll Notion for ready features
        id: poll
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_FEATURES_DB_ID: ${{ secrets.NOTION_FEATURES_DB_ID }}
        run: |
          python - <<'EOF'
          import os, json, requests, sys

          headers = {
              "Authorization": f"Bearer {os.environ['NOTION_API_KEY']}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json",
          }

          resp = requests.post(
              f"https://api.notion.com/v1/databases/{os.environ['NOTION_FEATURES_DB_ID']}/query",
              headers=headers,
              json={"filter": {"property": "Status", "select": {"equals": "Ready to Build"}}},
          )
          resp.raise_for_status()
          results = resp.json()["results"]

          if not results:
              print("No features ready to build.")
              sys.exit(0)

          # Take the first one — factory runs one at a time
          feature = results[0]
          feature_id = feature["id"]
          title = feature["properties"]["Title"]["title"]
          title_text = "".join(t["plain_text"] for t in title) if title else "Untitled"
          print(f"Found ready feature: {title_text} ({feature_id})")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"feature_id={feature_id}\n")
              f.write(f"found=true\n")
          EOF

      - name: Dispatch factory workflow
        if: steps.poll.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'factory-trigger',
              client_payload: {
                feature_id: '${{ steps.poll.outputs.feature_id }}'
              }
            })
            console.log('Dispatched factory for feature: ${{ steps.poll.outputs.feature_id }}')
